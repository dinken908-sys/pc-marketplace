meta:
  environment: nodejs
  toolchain:
    name: npm
    version: "20"
build:
  skip: false
  additionalCommands: cd backend && npm install
  artifacts:
    "*": /
run:
  scriptName: backend/server.js
  command: node backend/server.js
  persistenceMount: /data
  containerPort: "3000"
  servicePort: "80"