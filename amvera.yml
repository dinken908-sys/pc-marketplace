meta:
  environment: nodejs
  toolchain:
    name: npm
    version: "20"
build:
  skip: false
  additionalCommands: 
    - cd backend && npm install
  artifacts:
    backend: /
run:
  scriptName: backend/server.js
  scriptArguments: null
  nodeArguments: null
  command: npm start
  persistenceMount: /data
  containerPort: "80"
  servicePort: "80"